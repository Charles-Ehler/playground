<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ehlerpalooza</title>
<style>
  :root {
    --bg: #11151c;
    --bgGradient: radial-gradient(ellipse at top, #181f29 0%, #11151c 55%);
    --headerBorder: #232b38;
    --text: #eef1f6;
    --subtext: #8d96a8;
    --faintText: #5c6678;
    --accent: #ff6a3d;
    --accentBright: #ffb454;
    --accentText: #11151c;
    --cardBg: #181f29;
    --cardBgDone: #141a22;
    --cardBorder: #232b38;
    --divider: #1c232e;
    --checkboxBorder: #39414f;
    --noteBg: #141a22;
    --noteText: #ffb454;
    --ingredientText: #c9d1de;
    --tipBg: #1c2230;
    --tipBorder: #2c3445;
    --tipText: #ffb454;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --good: #45c98c;
    --goodText: #b9f0d6;
    --warn: #ff5c5c;
    --warnText: #ffd3d3;
  }
  [data-theme="light"] {
    --bg: #f5f7fa;
    --bgGradient: radial-gradient(ellipse at top, #ffffff 0%, #f5f7fa 55%);
    --headerBorder: #e1e6ed;
    --text: #1a2230;
    --subtext: #5c6678;
    --faintText: #a3acbd;
    --accent: #e8551f;
    --accentBright: #c2410c;
    --accentText: #ffffff;
    --cardBg: #ffffff;
    --cardBgDone: #eef1f5;
    --cardBorder: #e1e6ed;
    --divider: #edf0f4;
    --checkboxBorder: #c7cedb;
    --noteBg: #eef1f5;
    --noteText: #c2410c;
    --ingredientText: #2c384a;
    --tipBg: #fff1e8;
    --tipBorder: #f5c9ad;
    --tipText: #c2410c;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --good: #1f9d6b;
    --goodText: #15623f;
    --warn: #d63b3b;
    --warnText: #7a1f1f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bgGradient);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    transition: background 0.25s ease, color 0.25s ease;
    min-height: 100vh;
  }
  .header {
    padding: 26px 16px 14px;
    text-align: center;
    border-bottom: 1px solid var(--headerBorder);
    position: relative;
  }
  .header h1 {
    font-size: 19px;
    font-weight: 800;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }
  .header h1 svg { color: var(--accent); animation: flicker 3s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(1.04); }
  }
  .header p { font-size: 12px; color: var(--subtext); margin: 4px 0 0; }
  .theme-toggle {
    position: absolute;
    right: 16px;
    top: 22px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--cardBorder);
    background: transparent;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.3s ease, background 0.2s ease;
  }
  .theme-toggle:active { transform: scale(0.88) rotate(15deg); background: var(--cardBg); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--headerBorder);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 4px;
    font-size: 12.5px;
    font-weight: 600;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--faintText);
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:active { opacity: 0.7; }
  .tab-content { display: none; padding-bottom: 48px; animation: fadeIn 0.25s ease; }
  .tab-content.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Shopping tab */
  .shop-sticky {
    position: sticky;
    top: 45px;
    background: var(--bg);
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--headerBorder);
    z-index: 10;
  }
  .shop-sticky-row { display: flex; justify-content: space-between; align-items: center; }
  .shop-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 600;
    margin: 0;
  }
  .shop-count { font-size: 14px; margin: 2px 0 0; transition: color 0.2s ease; }
  .shop-count.all-done { color: var(--good); font-weight: 600; }
  .reset-btn {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--subtext);
    border: 1px solid var(--cardBorder);
    background: none;
    border-radius: 999px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .reset-btn:active { background: var(--cardBorder); }
  .progress-track {
    margin-top: 12px;
    height: 6px;
    width: 100%;
    background: var(--cardBorder);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accentBright));
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 999px;
  }

  .shop-body { padding: 0 16px; }
  .shop-group { margin-top: 20px; }
  .shop-group-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .shop-group-head h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin: 0;
  }
  .shop-group-head span { font-size: 11px; color: var(--faintText); transition: color 0.2s ease; }
  .shop-group-head span.complete { color: var(--good); }
  .shop-list {
    list-style: none;
    margin: 0;
    padding: 0;
    border: 1px solid var(--cardBorder);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--cardBg);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--divider);
    transition: background 0.2s ease;
  }
  .shop-item:last-child { border-bottom: none; }
  .shop-item:active { background: var(--divider); }
  .shop-item.checked { background: var(--cardBgDone); }
  .checkbox {
    flex-shrink: 0;
    width: 21px;
    height: 21px;
    border-radius: 6px;
    border: 2px solid var(--checkboxBorder);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05);
  }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; animation: popIn 0.2s ease; }
  @keyframes popIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  .shop-item-text { font-size: 14.5px; line-height: 1.3; color: var(--text); transition: color 0.2s ease; }
  .shop-item.checked .shop-item-text { color: var(--faintText); text-decoration: line-through; }

  .all-done-banner {
    margin: 16px 16px 0;
    padding: 12px 14px;
    background: var(--noteBg);
    border: 1px solid var(--good);
    border-radius: 10px;
    display: none;
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.3s ease;
  }
  .all-done-banner.show { display: flex; }
  .all-done-banner p { margin: 0; font-size: 13px; color: var(--goodText); font-weight: 600; }
  .all-done-banner svg { color: var(--good); flex-shrink: 0; }

  /* Recipe tab */
  .recipe-tab-body { padding: 16px; }
  .recipe-tab-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 4px;
  }
  .recipe-tab-sub { font-size: 13px; color: var(--subtext); margin: 0 0 16px; }
  .recipe-card {
    border: 1px solid var(--cardBorder);
    background: var(--cardBg);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s ease;
  }
  .recipe-head {
    width: 100%;
    background: none;
    border: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    color: inherit;
    font-family: inherit;
  }
  .recipe-head:active { background: var(--divider); }
  .recipe-title-row { display: flex; align-items: center; gap: 8px; }
  .recipe-head h3 { font-size: 15px; font-weight: 700; margin: 0; color: var(--text); }
  .badge-store {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--subtext);
    border: 1px solid var(--cardBorder);
    border-radius: 999px;
    padding: 2px 7px;
    font-weight: 600;
  }
  .recipe-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .recipe-meta span { font-size: 11px; color: var(--subtext); }
  .recipe-meta .steps-done { color: var(--accent); font-weight: 600; }
  .chevron { color: var(--subtext); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }
  .recipe-body { padding: 0 16px; border-top: 1px solid var(--cardBorder); max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
  .recipe-body.open { padding: 4px 16px 16px; max-height: 2000px; }
  .recipe-intro { font-size: 13px; font-style: italic; color: var(--subtext); margin: 12px 0; }
  .recipe-section { margin-bottom: 16px; }
  .recipe-section h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .ingredient-list { list-style: none; margin: 0; padding: 0; }
  .ingredient-list li { font-size: 13.5px; color: var(--ingredientText); display: flex; gap: 8px; margin-bottom: 6px; }
  .ingredient-list li::before { content: "•"; color: var(--accent); flex-shrink: 0; }
  .step-list { list-style: none; margin: 0; padding: 0; }
  .step-item { display: flex; gap: 12px; cursor: pointer; user-select: none; margin-bottom: 10px; }
  .step-item:active .step-text { opacity: 0.6; }
  .step-num {
    flex-shrink: 0;
    width: 21px;
    height: 21px;
    border-radius: 50%;
    border: 2px solid var(--checkboxBorder);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    font-size: 10px;
    font-weight: 700;
    color: var(--checkboxBorder);
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .step-num.checked { background: var(--accent); border-color: var(--accent); color: var(--accentText); transform: scale(1.05); }
  .step-num svg { display: none; }
  .step-num.checked svg { display: block; animation: popIn 0.2s ease; }
  .step-num.checked .step-num-text { display: none; }
  .step-text { font-size: 13.5px; line-height: 1.3; color: var(--text); transition: color 0.2s ease; }
  .step-item.checked .step-text { color: var(--faintText); text-decoration: line-through; }
  .recipe-note {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--noteBg);
    border: 1px solid var(--cardBorder);
    border-radius: 8px;
    display: flex;
    gap: 8px;
  }
  .recipe-note p { font-size: 12.5px; color: var(--noteText); margin: 0; }
  .recipe-note svg { flex-shrink: 0; margin-top: 2px; color: var(--accent); }

  /* Prep tab */
  .prep-tab-body { padding: 16px; }
  .prep-tab-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 4px;
  }
  .prep-tab-sub { font-size: 13px; color: var(--subtext); margin: 0 0 18px; }
  .prep-timeline { position: relative; padding-left: 28px; }
  .prep-timeline::before {
    content: '';
    position: absolute;
    left: 9px;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--cardBorder);
  }
  .prep-day { margin-bottom: 24px; position: relative; }
  .prep-day-marker {
    position: absolute;
    left: -28px;
    top: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--cardBg);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .prep-day-marker.done { background: var(--accent); }
  .prep-day-marker svg { display: none; color: var(--accentText); }
  .prep-day-marker.done svg { display: block; animation: popIn 0.2s ease; }
  .prep-day-head { margin-bottom: 10px; }
  .prep-day-head h3 { font-size: 14.5px; font-weight: 700; margin: 0; color: var(--text); }
  .prep-day-head p { font-size: 12px; color: var(--subtext); margin: 2px 0 0; }
  .prep-task {
    border: 1px solid var(--cardBorder);
    background: var(--cardBg);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .prep-task-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
  }
  .prep-task-head:active { background: var(--divider); }
  .prep-task.checked { background: var(--cardBgDone); }
  .prep-task-text-wrap { flex: 1; min-width: 0; }
  .prep-task-title { font-size: 14px; font-weight: 600; color: var(--text); transition: color 0.2s ease; }
  .prep-task.checked .prep-task-title { color: var(--faintText); text-decoration: line-through; }
  .prep-task-sub { font-size: 11.5px; color: var(--subtext); margin-top: 1px; }
  .prep-task-expand {
    color: var(--subtext);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }
  .prep-task-expand.open { transform: rotate(180deg); }
  .prep-task-detail {
    padding: 0 14px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    border-top: 1px solid transparent;
  }
  .prep-task-detail.open {
    padding: 2px 14px 14px;
    max-height: 400px;
    border-top: 1px solid var(--cardBorder);
  }
  .prep-task-detail p { font-size: 13px; color: var(--ingredientText); line-height: 1.5; margin: 10px 0 0; }
  .prep-tip {
    margin-top: 10px;
    padding: 9px 11px;
    background: var(--tipBg);
    border: 1px solid var(--tipBorder);
    border-radius: 8px;
    display: flex;
    gap: 7px;
  }
  .prep-tip svg { flex-shrink: 0; margin-top: 1px; color: var(--tipText); }
  .prep-tip p { margin: 0; font-size: 12px; color: var(--tipText); line-height: 1.4; }

  /* Serve-time countdown */
  .serve-bar {
    margin: 0 0 18px;
    padding: 12px 14px;
    background: var(--cardBg);
    border: 1px solid var(--cardBorder);
    border-radius: 12px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .serve-bar-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 600;
    margin: 0 0 4px;
  }
  .serve-bar-hint { font-size: 12px; color: var(--subtext); margin: 0; }
  .serve-bar input[type="datetime-local"] {
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--cardBorder);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .doing-now {
    margin: 0 0 18px;
    padding: 12px 14px;
    background: var(--noteBg);
    border: 1px solid var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }
  .doing-now.finished { border-color: var(--good); }
  .doing-now.upcoming { border-color: var(--cardBorder); background: var(--cardBg); }
  .doing-now svg { flex-shrink: 0; color: var(--accent); }
  .doing-now.finished svg { color: var(--good); }
  .doing-now.upcoming svg { color: var(--subtext); }
  .doing-now-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--subtext); margin: 0; }
  .doing-now-title { font-size: 13.5px; font-weight: 700; color: var(--text); margin: 2px 0 0; }
  .doing-now-sub { font-size: 12px; color: var(--noteText); margin: 2px 0 0; }
  .doing-now.upcoming .doing-now-sub { color: var(--subtext); }
  .task-badge {
    display: inline-flex;
    align-items: baseline;
    gap: 5px;
    font-size: 11px;
    color: var(--faintText);
    margin-top: 2px;
  }
  .task-badge .countdown { font-weight: 700; }
  .task-badge.state-soon .countdown, .task-badge.state-now .countdown { color: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
  .task-badge.state-overdue .countdown { color: var(--warn); }
  .task-badge.state-done .countdown { color: var(--good); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* Shared icon button reset */
  svg { display: block; }
</style>
</head>
<body>

<div class="header">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
  <h1 id="flameTitle">Ehlerpalooza</h1>
  <p>Tri-Tip Taco Bar · Home Edition · Serves 14 · <span id="versionTag"></span></p>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="prep">Prep</button>
  <button class="tab-btn" data-tab="shopping">Shopping</button>
  <button class="tab-btn" data-tab="recipes">Recipes</button>
</div>

<div class="tab-content active" id="tab-prep">
  <div class="prep-tab-body">
    <p class="prep-tab-label">Prep Timeline</p>
    <p class="prep-tab-sub">Everything to do before serve, in order</p>
    <div id="serveBar"></div>
    <div id="doingNow"></div>
    <div class="prep-timeline" id="prepTimeline"></div>
  </div>
</div>

<div class="tab-content" id="tab-shopping">
  <div class="shop-sticky">
    <div class="shop-sticky-row">
      <div>
        <p class="shop-label">Shopping List</p>
        <p class="shop-count" id="shopCount">0 of 0 grabbed</p>
      </div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="all-done-banner" id="allDoneBanner"></div>
  <div class="shop-body" id="shopBody"></div>
</div>

<div class="tab-content" id="tab-recipes">
  <div class="recipe-tab-body">
    <p class="recipe-tab-label">Recipes</p>
    <p class="recipe-tab-sub">Tri-Tip Self-Serve Taco Bar · Serves 14</p>
    <div id="recipeBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getDatabase, ref, child, set, onValue } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js';

// Bump this every time index.html changes, so the header version tag stays in sync.
const APP_VERSION = '5';

const SHOPPING_DATA = [
  { category: 'Meat', items: ['Tri-tip roast, 2-2.5 lbs (x2)'] },
  { category: 'Rub', items: ['Coarse ground coffee','Ancho chile powder','Smoked paprika','Kosher salt','Brown sugar','Garlic powder','Cumin','Black pepper'] },
  { category: 'Sauces', items: ['Sour cream, large container','Chipotles in adobo, 1 can','Avocados (x4, 3 for crema + 1 backup)','Salsa verde, 1-2 jars','Limes (x6)'] },
  { category: 'Taco Bar Toppings', items: ['Flour tortillas, 24 count','Corn tortillas, 24 count','Cotija cheese, 1 block','Shredded Mexican blend cheese, 1 bag','Pickled red onions, store-bought jar','White onion (x1)','Shredded cabbage or slaw mix, 1 bag','Fresh cilantro, 1 large bunch','Jalapeños, fresh or pickled jar','Hot sauce','Tortilla chips, 2 large bags'] },
  { category: 'Charro Beans', items: ['Pinto beans (x2 cans)','Bacon, 4-6 strips','Chicken broth, 1 can or carton'] },
  { category: 'Pantry Check', items: ['Foil','Squeeze bottles (x2)','Instant read thermometer','Cast iron skillet','Plastic wrap'] }
];

const RECIPES = [
  {
    id: 'tritip', title: 'Coffee-Chile Tri-Tip', time: '~3 hrs + overnight rub',

// Realtime Database keys can't contain ".", "#", "$", "[", "]" — our raw keys (item text, etc.) can.
function firebaseKey(rawKey) { return encodeURIComponent(rawKey).replace(/\./g, '%2E'); }

function readLocalChecked() {
  try { return JSON.parse(localStorage.getItem(CHECKLIST_KEY)) || {}; }
  catch (e) { return {}; }
}

let checklistCache = readLocalChecked();

function getChecked() { return checklistCache; }
function setChecked(obj) {
  checklistCache = obj;
  localStorage.setItem(CHECKLIST_KEY, JSON.stringify(obj));
}

function toggleChecked(key) {
  const c = getChecked();
  const next = !c[key];
  c[key] = next;
  setChecked(c);
  if (checklistRef) {
    set(child(checklistRef, firebaseKey(key)), next).catch(err => {
      console.warn('Could not sync checklist change to Firebase, saved locally only.', err);
    });
  }
}

function initFirebase() {
  if (!FIREBASE_CONFIG.databaseURL) return;
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    const db = getDatabase(app);
    checklistRef = ref(db, 'checklist');
    onValue(checklistRef, (snapshot) => {
      const remote = snapshot.val() || {};
      const decoded = {};
      Object.keys(remote).forEach(k => { decoded[decodeURIComponent(k)] = remote[k]; });
      setChecked(decoded);
      renderShopping();
      renderRecipes();
      renderPrep();
    }, (err) => {
      console.warn('Firebase sync unavailable, using local checklist state only.', err);
    });
  } catch (e) {
    console.warn('Firebase init failed, using local checklist state only.', e);
  }
}

function shopKey(item) { return 'shop:' + item; }
function stepKey(recipeId, idx) { return 'recipe:' + recipeId + ':step:' + idx; }
function prepKey(taskId) { return 'prep:' + taskId; }

function getServeTime() {
  const raw = localStorage.getItem(SERVE_TIME_KEY);
  if (raw) {
    const d = new Date(raw);
    if (!isNaN(d.getTime())) return d;
  }
  return new Date(DEFAULT_SERVE_TIME);
}
function setServeTime(isoLocal) { localStorage.setItem(SERVE_TIME_KEY, isoLocal); }

function haptic() { if (navigator.vibrate) navigator.vibrate(8); }

function formatClockTime(date) {
  return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function formatCountdown(ms) {
  const past = ms < 0;
  const totalMin = Math.round(Math.abs(ms) / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  const text = h > 0 ? `${h}h ${m}m` : `${m}m`;
  return past ? `${text} ago` : `in ${text}`;
}

function getTaskTiming(taskId, serveTime, isChecked) {
  const offset = TASK_OFFSETS[taskId];
  if (offset == null || !serveTime) return null;
  const taskTime = new Date(serveTime.getTime() - offset * 60000);
  const diffMs = taskTime.getTime() - Date.now();
  let state = 'future';
  if (isChecked) state = 'done';
  else if (diffMs <= 0) state = 'overdue';
  else if (diffMs <= 20 * 60000) state = 'soon';
  return {
    clock: formatClockTime(taskTime),
    countdown: isChecked ? 'Done' : (Math.abs(diffMs) < 60000 ? 'Now' : formatCountdown(diffMs)),
    state,
    diffMs
  };
}

function startOfDay(date) {
  const d = new Date(date.getTime());
  d.setHours(0, 0, 0, 0);
  return d;
}

// General clock-time window a day-phase covers, derived from serve time and the adjacent
// time-critical task boundaries — this is what "currently active" means for flexible tasks.
function getPhaseWindow(dayName, serveTime) {
  const serveMs = serveTime.getTime();
  const dayStartMs = startOfDay(serveTime).getTime();
  if (dayName === 'Day Before') return { start: dayStartMs - 24 * 60 * 60000, end: dayStartMs };
  if (dayName === 'Morning Of') return { start: dayStartMs, end: serveMs - TASK_OFFSETS['pull-meat'] * 60000 };
  if (dayName === 'Smoking Window') return { start: serveMs - TASK_OFFSETS['pull-meat'] * 60000, end: serveMs - TASK_OFFSETS['rest-sear-slice'] * 60000 };
  if (dayName === 'Final Hour') return { start: serveMs - TASK_OFFSETS['rest-sear-slice'] * 60000, end: Infinity };
  return { start: -Infinity, end: Infinity };
}

// {start, end} (ms) during which a task counts as "currently active." Time-critical tasks run from
// their own calculated time up to the next time-critical task's time; flexible tasks use their day-phase window.
function getTaskWindow(task, dayGroup, serveTime) {
  if (TASK_OFFSETS[task.id] != null) {
    const idx = CRITICAL_TASK_ORDER.indexOf(task.id);
    const start = serveTime.getTime() - TASK_OFFSETS[task.id] * 60000;
    const nextId = CRITICAL_TASK_ORDER[idx + 1];
    const end = nextId ? serveTime.getTime() - TASK_OFFSETS[nextId] * 60000 : Infinity;
    return { start, end };
  }
  if (task.window) return getPhaseWindow(dayGroup.day, serveTime);
  return null;
}

function isTaskActive(task, dayGroup, serveTime, nowMs) {
  const w = getTaskWindow(task, dayGroup, serveTime);
  return !!w && nowMs >= w.start && nowMs < w.end;
}

function renderShopping() {
  const checked = getChecked();
  const body = document.getElementById('shopBody');
  body.innerHTML = '';
  let total = 0, done = 0;

  SHOPPING_DATA.forEach(group => {
    let groupDone = 0;
    const groupEl = document.createElement('div');
    groupEl.className = 'shop-group';

    const head = document.createElement('div');
    head.className = 'shop-group-head';
    const h3 = document.createElement('h3');
    h3.textContent = group.category;
    const span = document.createElement('span');
    head.appendChild(h3);
    head.appendChild(span);
    groupEl.appendChild(head);

    const ul = document.createElement('ul');
    ul.className = 'shop-list';

    group.items.forEach(item => {
      total++;
      const key = shopKey(item);
      const isChecked = !!checked[key];
      if (isChecked) { done++; groupDone++; }

      const li = document.createElement('li');
      li.className = 'shop-item' + (isChecked ? ' checked' : '');
      li.innerHTML = `
        <span class="checkbox${isChecked ? ' checked' : ''}">${CHECK_SVG}</span>
        <span class="shop-item-text">${item}</span>
      `;
      li.addEventListener('click', () => {
        haptic();
        toggleChecked(key);
        renderShopping();
      });
      ul.appendChild(li);
    });

    span.textContent = groupDone + '/' + group.items.length;
    if (groupDone === group.items.length) span.classList.add('complete');
    groupEl.appendChild(ul);
    body.appendChild(groupEl);
  });

  const countEl = document.getElementById('shopCount');
  countEl.textContent = done + ' of ' + total + ' grabbed';
  countEl.classList.toggle('all-done', total > 0 && done === total);
  document.getElementById('progressFill').style.width = (total ? (done / total) * 100 : 0) + '%';

  const banner = document.getElementById('allDoneBanner');
  if (total > 0 && done === total) {
    banner.innerHTML = `${CHECKCIRCLE_SVG}<p>Cart's full. You're ready to cook.</p>`;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

    const card = document.createElement('div');

    headBtn.className = 'recipe-head';

    const bodyDiv = document.createElement('div');

    let sectionsHtml = '';

      sectionsHtml += `
        <div class="recipe-section">

          <ul class="ingredient-list">
            ${section.ingredients.map(ing => `<li>${ing}</li>`).join('')}

        </div>
      `;
    });

    let stepsHtml = '<ol class="step-list">';
    recipe.steps.forEach((step, i) => {
      const key = stepKeys[i];
      const isChecked = !!checked[key];
      stepsHtml += `
        <li class="step-item${isChecked ? ' checked' : ''}" data-stepkey="${key}">
          <span class="step-num${isChecked ? ' checked' : ''}">
            ${CHECK_SVG}
            <span class="step-num-text">${i + 1}</span>
          </span>
          <span class="step-text">${step}</span>
        </li>
      `;
    });
    stepsHtml += '</ol>';

    bodyDiv.innerHTML = `
      <p class="recipe-intro">${recipe.intro}</p>
      ${sectionsHtml}
      <h4 style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin:0 0 8px;font-weight:600;">Steps</h4>

      ${recipe.note ? `<div class="recipe-note">${FLAME_SVG.replace('width="18" height="18"', 'width="14" height="14"')}<p>${recipe.note}</p></div>` : ''}
    `;

    bodyDiv.querySelectorAll('.step-item').forEach(el => {
      el.addEventListener('click', () => {
        haptic();
        toggleChecked(el.getAttribute('data-stepkey'));
        renderRecipes();
      });
    });

    card.appendChild(bodyDiv);
    body.appendChild(card);
  });
}

function toLocalInputValue(date) {
  const pad = n => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

      <input type="datetime-local" id="serveTimeInput" value="${toLocalInputValue(serveTime)}">

  `;
  document.getElementById('serveTimeInput').addEventListener('change', (e) => {
    if (e.target.value) setServeTime(e.target.value);
    else localStorage.removeItem(SERVE_TIME_KEY);

function renderDoingNow(serveTime, checked) {
  const el = document.getElementById('doingNow');
  const nowMs = Date.now();

  const entries = [];
  PREP_DATA.forEach(group => {
    group.tasks.forEach(task => {
      if (TASK_OFFSETS[task.id] != null || task.window) entries.push({ task, group });
    });
  });
  const unchecked = entries.filter(({ task }) => !checked[prepKey(task.id)]);

  if (unchecked.length === 0) {
    el.innerHTML = `
      <div class="doing-now finished">
        ${CHECKCIRCLE_SVG}
        <div>
          <p class="doing-now-label">All prep done</p>
          <p class="doing-now-title">Time to eat.</p>
        </div>
      </div>
    `;
    return;
  }

  const active = unchecked.find(({ task, group }) => isTaskActive(task, group, serveTime, nowMs));

  if (active) {
    const timing = TASK_OFFSETS[active.task.id] != null ? getTaskTiming(active.task.id, serveTime, false) : null;
    const sub = timing ? `${timing.clock} · ${timing.countdown}` : active.task.window;
    el.innerHTML = `
      <div class="doing-now">
        ${CLOCK_SVG.replace('width="11" height="11"', 'width="18" height="18"')}
        <div>
          <p class="doing-now-label">Doing now</p>
          <p class="doing-now-title">${active.task.title}</p>
          <p class="doing-now-sub">${sub}</p>
        </div>
      </div>
    `;
    return;
  }

  let next = null;
  unchecked.forEach(entry => {
    const w = getTaskWindow(entry.task, entry.group, serveTime);
    if (w && (!next || w.start < next.start)) next = { task: entry.task, start: w.start };
  });
  if (!next) { el.innerHTML = ''; return; }

  const diffMs = next.start - nowMs;
  const sub = diffMs > 0 ? `Starts ${formatCountdown(diffMs)}` : 'Starting now';
  el.innerHTML = `
    <div class="doing-now upcoming">
      ${CLOCK_SVG.replace('width="11" height="11"', 'width="18" height="18"')}
      <div>
        <p class="doing-now-label">Upcoming</p>
        <p class="doing-now-title">${next.task.title}</p>
        <p class="doing-now-sub">${sub}</p>
      </div>
    </div>
  `;
}

function renderPrep() {
  const checked = getChecked();
  const serveTime = getServeTime();
  renderServeBar();
  renderDoingNow(serveTime, checked);

  const wrap = document.getElementById('prepTimeline');
  wrap.innerHTML = '';

  PREP_DATA.forEach(dayGroup => {
    const dayDone = dayGroup.tasks.every(t => checked[prepKey(t.id)]);

    const dayEl = document.createElement('div');
    dayEl.className = 'prep-day';

    const marker = document.createElement('div');
    marker.className = 'prep-day-marker' + (dayDone ? ' done' : '');
    marker.innerHTML = CHECK_SVG;
    dayEl.appendChild(marker);

    const head = document.createElement('div');
    head.className = 'prep-day-head';
    head.innerHTML = `<h3>${dayGroup.day}</h3><p>${dayGroup.sub}</p>`;
    dayEl.appendChild(head);

    dayGroup.tasks.forEach(task => {
      const key = prepKey(task.id);
      const isChecked = !!checked[key];
      const isOpen = openPrepTaskId === task.id;

      const taskEl = document.createElement('div');
      taskEl.className = 'prep-task' + (isChecked ? ' checked' : '');

      const timing = getTaskTiming(task.id, serveTime, isChecked);
      let badgeHtml = '';
      if (timing) {
        badgeHtml = `<div class="task-badge state-${timing.state}"><span>${timing.clock}</span><span class="countdown">${timing.countdown}</span></div>`;
      } else if (task.window) {
        badgeHtml = `<div class="task-badge"><span>${task.window}</span></div>`;
      }

      const headRow = document.createElement('div');
      headRow.className = 'prep-task-head';
      headRow.innerHTML = `
        <span class="checkbox${isChecked ? ' checked' : ''}">${CHECK_SVG}</span>
        <span class="prep-task-text-wrap">
          <div class="prep-task-title">${task.title}</div>
          <div class="prep-task-sub">${task.sub}</div>
          ${badgeHtml}
        </span>
        <span class="prep-task-expand${isOpen ? ' open' : ''}">${CHEVRON_SVG}</span>
      `;

      const checkboxEl = headRow.querySelector('.checkbox');
      checkboxEl.addEventListener('click', (e) => {
        e.stopPropagation();
        haptic();
        toggleChecked(key);
        renderPrep();
      });

      headRow.addEventListener('click', (e) => {
        if (e.target.closest('.checkbox')) return;
        openPrepTaskId = isOpen ? null : task.id;
        renderPrep();
      });

      taskEl.appendChild(headRow);

      const detail = document.createElement('div');
      detail.className = 'prep-task-detail' + (isOpen ? ' open' : '');
      detail.innerHTML = `
        <p>${task.detail}</p>
        ${task.tip ? `<div class="prep-tip">${BULB_SVG}<p>${task.tip}</p></div>` : ''}
      `;
      taskEl.appendChild(detail);

      dayEl.appendChild(taskEl);
    });

    wrap.appendChild(dayEl);
  });
}

document.getElementById('resetBtn').addEventListener('click', () => {
  setChecked({});
  if (checklistRef) {
    set(checklistRef, null).catch(err => {
      console.warn('Could not clear shared checklist on Firebase, cleared locally only.', err);
    });
  }
  renderShopping();
  renderRecipes();
  renderPrep();
});

const TAB_ORDER = ['prep', 'shopping', 'recipes'];

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

let touchStartX = 0, touchStartY = 0;
document.querySelectorAll('.tab-content').forEach(tab => {
  tab.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, { passive: true });
  tab.addEventListener('touchend', (e) => {
    const deltaX = e.changedTouches[0].clientX - touchStartX;
    const deltaY = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(deltaX) < 60 || Math.abs(deltaX) < Math.abs(deltaY) * 2) return;
    const current = TAB_ORDER.indexOf(document.querySelector('.tab-btn.active').dataset.tab);
    const next = current + (deltaX < 0 ? 1 : -1);
    if (next < 0 || next >= TAB_ORDER.length) return;
    switchTab(TAB_ORDER[next]);
  }, { passive: true });
});

function getTheme() { return localStorage.getItem(THEME_KEY) || 'dark'; }
function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});

document.getElementById('flameTitle').innerHTML = FLAME_SVG + ' Ehlerpalooza';
document.getElementById('versionTag').textContent = 'v' + APP_VERSION;

applyTheme(getTheme());
renderShopping();
renderRecipes();
renderPrep();
initFirebase();
setInterval(renderPrep, 30000);
</script>
